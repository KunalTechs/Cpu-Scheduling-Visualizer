version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: scheduler_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - scheduler-network

  backend:
    build: 
      context: ./Backend
    container_name: scheduling_backend
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    networks:
      - scheduler-network
    tty: true

volumes:
  mongo_data:

  # --- React Frontend (Placeholder for later) ---
  # frontend:
  #   build:
  #     context: ./Frontend
  #   container_name: scheduling_frontend
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - scheduler-network

networks:
  scheduler-network:
    driver: bridge