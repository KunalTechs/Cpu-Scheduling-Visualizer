version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: scheduler_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - scheduler-network

  backend:
    build: 
      context: ./Backend
    container_name: scheduling_backend
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    networks:
      - scheduler-network
    tty: true

  frontend:
    build:
      context: ./frontend
    container_name: scheduling_frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app           # Syncs your code
      - /app/node_modules         # Keeps container's modules safe
    environment:
      - WATCHPACK_POLLING=true    # For Webpack/General
      - CHOKIDAR_USEPOLLING=true  # For Vite/Chokidar
    depends_on:
      - backend
    networks:
      - scheduler-network

volumes:
  mongo_data:

networks:
  scheduler-network:
    driver: bridge